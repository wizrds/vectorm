name: Feature Request
description: Suggest an idea for this project
title: "[Feature]: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        ### Please read this!
        Before opening a new issue, make sure to search for keywords in the issues 
        filtered by the "feature" label and verify the issue you're about to submit isn't a duplicate.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Provide a brief, clear description of the feature you're requesting.
      placeholder: e.g., Add dark mode support to the dashboard
    validations:
      required: true

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: Describe the problem or limitation this feature would solve. What user need or business requirement drives this request?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed approach to implementing this feature. Include any specific functionality, behavior, or design considerations.
    validations:
      required: true

  - type: textarea
    id: alternative-solutions
    attributes:
      label: Alternative Solutions
      description: Have you considered any alternative approaches? Describe them here and why they might not be ideal.

  - type: textarea
    id: benefits
    attributes:
      label: Benefits
      description: What value does this feature provide? Consider impact on users, maintainability, performance, etc.

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List the specific conditions that must be met for this feature to be considered complete.
      placeholder: |
        - [ ] Condition 1
        - [ ] Condition 2

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, examples from other systems, or references that would help understand this request.